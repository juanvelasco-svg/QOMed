<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; overflow: hidden; }
        .tabs { display: flex; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; background: #f5f5f5; font-weight: bold; color: #666; transition: all 0.3s; }
        .tab.active { background: white; color: #667eea; border-bottom: 2px solid #667eea; }
        .form-container { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #5568d3; }
        .message { padding: 10px; margin-top: 15px; border-radius: 5px; text-align: center; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="showTab('register')">Registrarse</div>
        </div>
        
        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2>Bienvenido</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-container" style="display: none;">
            <h2>Crear Cuenta</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required placeholder="Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="••••••••" minlength="6">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="reg-role" required>
                        <option value="alumno">Alumno</option>
                        <option value="profesor">Profesor</option>
                    </select>
                </div>
                <button type="submit">Registrarse</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN ===
        const STORAGE_KEYS = {
            USERS: 'edu_users',
            SESSION: 'edu_session'
        };

        const ROLES = {
            ADMIN: 'admin',
            TEACHER: 'profesor',
            STUDENT: 'alumno'
        };

        // === UTILIDADES ===
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }

        function getUsers() {
            const users = localStorage.getItem(STORAGE_KEYS.USERS);
            if (!users) {
                // Crear admin por defecto si no existe
                const defaultAdmin = {
                    id: 'admin-001',
                    name: 'Administrador',
                    email: 'admin@edu.com',
                    password: hashPassword('admin123'),
                    role: ROLES.ADMIN
                };
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([defaultAdmin]));
                return [defaultAdmin];
            }
            return JSON.parse(users);
        }

        function saveUsers(users) {
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
        }

        function showMessage(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'message ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => { el.className = 'message'; }, 5000);
        }

        // === AUTH ===
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim().toLowerCase();
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            const users = getUsers();
            
            if (users.find(u => u.email === email)) {
                showMessage('register-message', 'El email ya está registrado', false);
                return;
            }

            const newUser = {
                id: 'user-' + Date.now(),
                name,
                email,
                password: hashPassword(password),
                role
            };

            users.push(newUser);
            saveUsers(users);

            showMessage('register-message', 'Registro exitoso. Ahora puedes iniciar sesión.', true);
            e.target.reset();
            setTimeout(() => showTab('login'), 1500);
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            const hashedPwd = hashPassword(password);

            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === hashedPwd);

            if (!user) {
                showMessage('login-message', 'Email o contraseña incorrectos', false);
                return;
            }

            // Guardar sesión
            const session = {
                userId: user.id,
                email: user.email,
                name: user.name,
                role: user.role,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(session));

            // Redirigir según rol
            if (user.role === ROLES.ADMIN) {
                window.location.href = 'admin.html';
            } else if (user.role === ROLES.TEACHER) {
                window.location.href = 'teacher.html';
            } else if (user.role === ROLES.STUDENT) {
                window.location.href = 'student.html';
            }
        }

        // === UI ===
        function showTab(tabName) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.tab');

            if (tabName === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }

            // Limpiar mensajes
            document.getElementById('login-message').className = 'message';
            document.getElementById('register-message').className = 'message';
        }

        // Verificar sesión al cargar
        window.onload = function() {
            const session = localStorage.getItem(STORAGE_KEYS.SESSION);
            if (session) {
                const userSession = JSON.parse(session);
                if (userSession.role === ROLES.ADMIN) {
                    window.location.href = 'admin.html';
                } else if (userSession.role === ROLES.TEACHER) {
                    window.location.href = 'teacher.html';
                } else if (userSession.role === ROLES.STUDENT) {
                    window.location.href = 'student.html';
                }
            }
        };
    </script>
</body>
</html>
