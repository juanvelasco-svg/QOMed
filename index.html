<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidad - Sistema de Gestión de Cursos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 0.8rem; text-align: center; cursor: pointer; color: #666; font-weight: 600; }
        .tab.active { color: #1e3a8a; border-bottom: 2px solid #1e3a8a; }
        input, select { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.9rem; background: #1e3a8a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1e40af; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Universidad</h2>
        <p class="subtitle">Sistema de Gestión Académica<br>Plataforma educativa universitaria</p>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="showTab('register')">Registrarse</div>
        </div>

        <div id="login">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Contraseña" required>
            <button onclick="window.location.href='student.html'">Ingresar</button>
        </div>

        <div id="register" class="hidden">
            <input type="text" placeholder="Nombre Completo" required>
            <input type="email" placeholder="Email" required>
            <select>
                <option value="">Selecciona un rol</option>
                <option value="student">Alumno</option>
                <option value="teacher">Profesor</option>
                <option value="admin">Administrador</option>
            </select>
            <input type="password" placeholder="Contraseña" required>
            <button>Registrarse</button>
        </div>
    </div>
    <script>
        function showTab(tab) {
            document.getElementById('login').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
