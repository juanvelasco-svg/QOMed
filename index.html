<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QOMed - Sistema de Gestión de Cursos</title>
    <style>
        :root { --primary: #003366; --secondary: #D4AF37; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        input, select { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #002244; }
        .toggle-link { margin-top: 1rem; color: var(--primary); cursor: pointer; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QOMed</h1>
        <p>Sistema de Gestión Académica</p>
        
        <!-- Formulario de Login -->
        <div id="login-form">
            <input type="email" id="login-email" placeholder="Email (ej: alumno@uni.edu)" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button onclick="login()">Ingresar</button>
            <div class="toggle-link" onclick="toggleForms()">¿No tienes cuenta? Regístrate</div>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-form" class="hidden">
            <input type="text" id="reg-name" placeholder="Nombre Completo" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <select id="reg-role">
                <option value="student">Alumno</option>
                <option value="teacher">Profesor</option>
            </select>
            <input type="password" id="reg-pass" placeholder="Contraseña" required>
            <button onclick="register()">Registrarse</button>
            <div class="toggle-link" onclick="toggleForms()">¿Ya tienes cuenta? Inicia Sesión</div>
        </div>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        function login() {
            const email = document.getElementById('login-email').value;
            if(!email) return alert("Ingresa un email");
            // Simular ID de estudiante a partir del email
            const studentId = email.split('@')[0].toUpperCase();
            localStorage.setItem('qomed_user', studentId);
            localStorage.setItem('qomed_role', 'student'); // Por defecto para la demo
            window.location.href = 'student.html';
        }

        function register() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const role = document.getElementById('reg-role').value;
            if(!name || !email) return alert("Completa todos los campos");
            
            const userId = email.split('@')[0].toUpperCase();
            localStorage.setItem('qomed_user', userId);
            localStorage.setItem('qomed_role', role);
            
            if(role === 'teacher') window.location.href = 'teacher.html';
            else window.location.href = 'student.html';
        }
    </script>
</body>
</html>
