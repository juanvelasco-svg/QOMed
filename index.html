<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Educativa - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: #667eea;
            background-image: url('./images/fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 450px; 
            overflow: hidden; 
        }
        .logo-container {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #667eea;
        }
        .logo-container img {
            max-width: 150px;
            height: auto;
        }
        .tabs { display: flex; }
        .tab { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            background: #f5f5f5; 
            font-weight: bold; 
            color: #666; 
            transition: all 0.3s; 
        }
        .tab.active { 
            background: white; 
            color: #667eea; 
            border-bottom: 2px solid #667eea; 
        }
        .form-container { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 14px; 
            transition: border-color 0.3s; 
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s; 
        }
        button:hover { background: #5568d3; }
        .message { 
            padding: 10px; 
            margin-top: 15px; 
            border-radius: 5px; 
            text-align: center; 
            display: none; 
        }
        .message.success { 
            background: #d4edda; 
            color: #155724; 
            display: block; 
        }
        .message.error { 
            background: #f8d7da; 
            color: #721c24; 
            display: block; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 25px; 
        }
        .default-creds {
            margin-top: 15px;
            padding: 10px;
            background: #e7f3ff;
            border-radius: 5px;
            font-size: 12px;
            color: #0066cc;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="images/logo.png" alt="Logo Universidad" onerror="this.style.display='none'">
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="showTab('register')">Registrarse</div>
        </div>
        
        <!-- Login Form -->
        <div id="login-form" class="form-container">
            <h2>Bienvenido</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div id="login-message" class="message"></div>
            <div class="default-creds">
                <strong>Admin por defecto:</strong><br>
                Email: admin@universidad.edu | Contraseña: admin123
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-container" style="display: none;">
            <h2>Crear Cuenta</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required placeholder="Juan Pérez">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="••••••••" minlength="6">
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select id="reg-role" required>
                        <option value="alumno">Alumno</option>
                        <option value="profesor">Profesor</option>
                    </select>
                </div>
                <button type="submit">Registrarse</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <!-- Cargar scripts en orden correcto -->
    <script src="js/config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // === UI Functions ===
        function showTab(tabName) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.tab');

            if (tabName === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }

            // Limpiar mensajes
            document.getElementById('login-message').className = 'message';
            document.getElementById('register-message').className = 'message';
        }

        function showMessage(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'message ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => { el.className = 'message'; }, 5000);
        }

        // === Registro usando auth.js ===
        function handleRegister(e) {
            e.preventDefault();
            const nombre = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const rol = document.getElementById('reg-role').value;

            const result = registerUser(nombre, email, password, rol);
            
            if (result.success) {
                showMessage('register-message', result.message, true);
                e.target.reset();
                setTimeout(() => showTab('login'), 1500);
            } else {
                showMessage('register-message', result.message, false);
            }
        }

        // === Login usando auth.js ===
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const result = loginUser(email, password);
            
            if (!result.success) {
                showMessage('login-message', result.message, false);
            }
            // Si es exitoso, loginUser ya redirige automáticamente
        }

        // === Verificar sesión al cargar ===
        window.onload = function() {
            const session = getCurrentSession();
            if (session) {
                const redirectMap = {
                    'admin': 'admin.html',
                    'profesor': 'teacher.html',
                    'alumno': 'student.html'
                };
                const redirectUrl = redirectMap[session.rol];
                if (redirectUrl) {
                    window.location.href = redirectUrl;
                }
            }
        };
    </script>
</body>
</html>
