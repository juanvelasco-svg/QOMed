<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Alumno</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; }
        header { background: #1e3a8a; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logout { color: white; text-decoration: none; background: #dc2626; padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .filter-btn { padding: 0.5rem 1rem; border: 1px solid #cbd5e1; background: white; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: #1e3a8a; color: white; border-color: #1e3a8a; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #1e3a8a; }
        .btn-enter { display: inline-block; margin-top: 1rem; background: #1e3a8a; color: white; padding: 0.6rem 1.2rem; text-decoration: none; border-radius: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <strong>Panel del Alumno</strong>
        <div>
            <span style="margin-right: 1rem;">Alumno</span>
            <a href="index.html" class="logout">Cerrar Sesión</a>
        </div>
    </header>
    <div class="container">
        <h2>Mis Cursos</h2>
        <div class="filters">
            <button class="filter-btn active">Todas</button>
            <button class="filter-btn">Pendientes</button>
            <button class="filter-btn">En Progreso</button>
            <button class="filter-btn">Completadas</button>
        </div>
        <h3>Clases Disponibles</h3>
        <div class="grid">
            <div class="card">
                <h3>Capítulo 01: Estructura Molecular</h3>
                <p>El átomo de Carbono, hibridación y propiedades.</p>
                <!-- ENLACE CORREGIDO PARA QUE FUNCIONE CON TU ID -->
                <a href="clases/cap01-estructura/index.html?student_id=ALUMNO001" class="btn-enter">Ingresar a la Clase</a>
            </div>
        </div>
        <h3 style="margin-top: 2rem;">Mi Actividad Reciente</h3>
        <div class="card">
            <p>No hay actividad reciente registrada.</p>
        </div>
    </div>
</body>
</html>
